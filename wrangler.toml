name = "proorca"
compatibility_date = "2026-04-04"
compatibility_flags = ["nodejs_compat"]
main = "@tanstack/react-start/server-entry"
workers_dev = true
preview_urls = false

[observability]
enabled = true

# ---------- D1 Database ----------
[[d1_databases]]
binding = "DB"
database_name = "proorca-db"
database_id = "235d1e83-7902-4816-be30-8b4647e67e6f"
migrations_dir = "drizzle"

# ---------- R2 Storage ----------
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "proorca-assets"

# ---------- Workers AI ----------
[ai]
binding = "AI"

# ---------- Secrets ----------
# Set via: wrangler secret put <SECRET_NAME>
# Do NOT commit real keys — always use `wrangler secret put`.
#
# SUPADATA_API_KEY   — optional; enables transcript-based quiz generation for video lessons.
#                      Without it, quizzes fall back to video title/description context.
#
# OER_API_KEY        — OER Commons JSON Search API key.
#                      https://www.oercommons.org/api/v1/
#
# CK12_API_KEY       — CK-12 Developer API bearer token.
#                      https://api.ck12.org/
#
# PBS_API_KEY        — PBS LearningMedia v2 API bearer token.
#                      https://www.pbslearningmedia.org/api/v2/
#                      NOTE: use the LearningMedia API, NOT the consumer PBS Kids API.
#
# [vars]
# SUPADATA_API_KEY = ""
# JINA_API_KEY     = ""
# OER_API_KEY      = ""
# CK12_API_KEY     = ""
# PBS_API_KEY      = ""
